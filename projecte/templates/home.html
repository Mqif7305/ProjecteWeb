<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Shop</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0f172a;
            color: white;
        }

        .card {
            background-color: #1e293b;
            border: none;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .navbar {
            background-color: #020617;
            display: flex;
            align-items: center;
        }

        search-container {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
        }

        .search-input {
            width: 100%;
            height: 45px;
            font-size: 1.1rem;
            border-radius: 8px;
        }

        .suggestions-box {
            background-color: #1e293b;
            position: absolute;
            width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            z-index: 1000;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            color: white;
        }

        .suggestion-item:hover {
            background-color: #334155;
        }

        .descrText {
            color: white;
        }
    </style>
</head>
<body>

<!-- Barra de buscar -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">GameStore</span>

    <div class="search-container">
        <input id="searchInput" class="form-control search-input" type="text" placeholder="Search for games...">

        <div id="suggestions" class="suggestions-box"></div>
    </div>
</nav>

<!-- Espacio para enseñar ofertas -->
<div class="container mt-4">
    <div class="row">

        {% for juego in juegos %}
        <div class="col-md-3 mb-4">
            <div class="card p-2">

                <img src="{{ juego.details.header_image }}" class="card-img-top" alt="">

                <div class="card-body">
                    <p class="descrText">{{ juego.name }}</p>

                    {% if juego.details.score %}
                        <p class="descrText">score: {{ juego.details.score }}</p>
                    {% endif %}

                    <p class="descrText">{{ juego.price }}</p>

                    <!-- Aqui deberíamos meter algun boton que llevase a los detalles del juego -->
                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

<script>
    const input = document.getElementById("searchInput");
    const suggestionsBox = document.getElementById("suggestions");

    input.addEventListener("input", async () => {
        const query = input.value;

        if (query.length < 2) {
            suggestionsBox.innerHTML = "";
            return;
        }

        const response = await fetch(`/search/?q=${query}`);
        const data = await response.json();

        suggestionsBox.innerHTML = "";

        data.forEach(game => {
            const div = document.createElement("div");
            div.classList.add("suggestion-item");
            div.textContent = game.name;

            div.addEventListener("click", () => {
                input.value = game.name;
                suggestionsBox.innerHTML = "";
            });

            suggestionsBox.appendChild(div);
        });
    });
</script>

</body>
</html>
