<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Game Price Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(180deg, #1e1b4b, #0f172a);
            color: white;
        }

        .header {
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-weight: bold;
        }

        .header p {
            color: #94a3b8;
        }

        .search-container {
            position: relative;
            width: 50%;
            margin: auto;
        }

        .search-input {
            width: 100%;
            height: 55px;
            border-radius: 12px;
            border: none;
            background-color: #1e293b;
            color: white;
            padding-left: 20px;
        }

        .suggestions-box {
            background-color: #1e293b;
            position: absolute;
            width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            z-index: 1000;
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
        }

        .suggestion-item:hover {
            background-color: #334155;
        }

        .card {
            background: #2e2a5e;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card-body {
            padding: 15px;
        }

        .game-title {
            font-weight: bold;
            font-size: 1.1rem;
            color: white;
        }

        .price-box {
            background-color: #1e293b;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            color: #cbd5f5;
        }

        .price {
            color: #22c55e;
            font-weight: bold;
        }

        .btn-deal {
            margin-top: 15px;
            width: 100%;
            background: linear-gradient(90deg, #7c3aed, #9333ea);
            border: none;
        }

        .btn-deal:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <h1>Game Price Tracker</h1>
    <p>Find the best deals across all stores</p>

    <!-- Barra de busqueda -->
    <div class="search-container mt-4">
        <input id="searchInput" class="form-control search-input" type="text" placeholder="Search for games...">
        <div id="suggestions" class="suggestions-box"></div>
    </div>
</div>

<!-- Espacio para enseñar ofertas -->
<div class="container mt-4">
    <div class="row">

        {% for juego in juegos %}
        <div class="col-md-4 mb-4">
            <div class="card">

                <img src="{{ juego.details.header_image }}" class="card-img-top" alt="">

                <div class="card-body">
                    <p class="game-title">{{ juego.name }}</p>

                    {% if juego.details.score %}
                        <p style="color:#facc15">score: {{ juego.details.score }}</p>
                    {% endif %}

                    <div class="price-box">
                        <span>Steam</span>
                        <span class="float-end price">{{ juego.price }}</span>
                    </div>

                    <!-- Aqui deberíamos meter algun boton que llevase a los detalles del juego -->
                </div>

            </div>
        </div>
        {% endfor %}

    </div>
</div>

<script>
    const input = document.getElementById("searchInput");
    const suggestionsBox = document.getElementById("suggestions");

    input.addEventListener("input", async () => {
        const query = input.value;

        if (query.length < 2) {
            suggestionsBox.innerHTML = "";
            return;
        }

        const response = await fetch(`/search/?q=${query}`);
        const data = await response.json();

        suggestionsBox.innerHTML = "";

        data.forEach(game => {
            const div = document.createElement("div");
            div.classList.add("suggestion-item");
            div.textContent = game.name;

            div.addEventListener("click", () => {
                input.value = game.name;
                suggestionsBox.innerHTML = "";
            });

            suggestionsBox.appendChild(div);
        });
    });
</script>

</body>
</html>
