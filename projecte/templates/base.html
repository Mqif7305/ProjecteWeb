<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Game Price Tracker{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            background: linear-gradient(180deg, #1e1b4b, #0f172a);
            color: white;
        }

        .navbar-custom {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .navbar-logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
        }

        .navbar-logo:hover {
            color: #c4b5fd;
        }

        .navbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-login {
            background: linear-gradient(90deg, #7c3aed, #9333ea);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
        }

        .btn-logout {
            background: transparent;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 8px 20px;
            border-radius: 8px;
        }

        .user-greeting {
            color: #94a3b8;
            margin-right: 12px;
            font-size: 0.9rem;
        }

        .btn-profile {
            background: #334155;
            border: 1px solid #475569;
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;

            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-profile:hover {
            background: #475569;
            color: white;
        }

        .btn-wishlist {
            background: linear-gradient(90deg, #f59e0b, #facc15);
            border: none;
            color: black;
            padding: 8px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-wishlist:hover {
            opacity: 0.9;
            color: black;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body>

<!-- NAVBAR GLOBAL -->
<div class="navbar-custom">

    <a href="{% url 'home' %}" class="navbar-logo">
        🎮 Game Price Tracker
    </a>

    <div class="navbar-right">

        {% if user.is_authenticated %}

            <span class="user-greeting">
                Hi, {{ user.username }}!
            </span>
            
            <a href="{% url 'wishlist' %}" class="btn-wishlist">Wishlist</a>

            <a href="{% url 'profile' %}" class="btn-profile">
                <i class="bi bi-person-circle"></i>
                Profile
            </a>

            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="btn-logout">
                    Logout
                </button>
            </form>

        {% else %}

            <a href="{% url 'login' %}" class="btn-login">
                Login / Register
            </a>

        {% endif %}

    </div>

</div>

{% block content %}{% endblock %}

{% block extra_js %}{% endblock %}

</body>
</html>
